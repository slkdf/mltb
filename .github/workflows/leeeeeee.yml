name: Build Docker

on:
  push:
   branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  RUNNING:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Create Image
        run: docker pull downloadyh/mltb:v1 
      - name: Run Image
        run: docker run --env CONFIG_FILE_URL=${{ secrets.CONFIG_FILE_URL }} --env TOKEN_PICKLE_URL=${{ secrets.TOKEN_PICKLE_URL }} downloadyh/mltb:v1 
