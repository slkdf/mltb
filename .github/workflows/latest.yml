name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ] # Triggers on push to main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com)

      - name: Set up Docker Buildx
        uses: [docker/setup-buildx-action@v3](https://github.com/docker/setup-buildx-action)

      - name: Login to Docker Hub
        uses: [docker/login-action@v3](https://github.com/docker/login-action)
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: [docker/build-push-action@v6](https://github.com/docker/build-push-action)
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mltb:latest
